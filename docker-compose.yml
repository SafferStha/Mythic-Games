version: '3.9'

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mythic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-MythicGamesStoreDB}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-MythicGamesStoreDB}"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - mythic-network

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: mythic-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV:    production
      DB_HOST:     postgres
      DB_PORT:     5432
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    networks:
      - mythic-network
    healthcheck:
      test:     ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:  ${VITE_API_URL:-http://localhost:5000}
        VITE_APP_NAME: ${VITE_APP_NAME:-MythicGames}
    container_name: mythic-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mythic-network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  backend_logs:
  backend_uploads:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  mythic-network:
    driver: bridge
