name: CI

on:
  push:
    branches: [main, Saffer, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV:               test
          JWT_SECRET:             ${{ secrets.JWT_SECRET || 'ci-test-secret-at-least-32-chars!!' }}
          JWT_REFRESH_SECRET:     ${{ secrets.JWT_REFRESH_SECRET || 'ci-test-refresh-secret-32-chars!!' }}
          ESEWA_SECRET_KEY:       '8gBm/:&EnhH.1/q'
          ESEWA_MERCHANT_CODE:    EPAYTEST

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # ── Frontend Tests, Lint & Build ─────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Run frontend tests
        working-directory: frontend
        run: npm test
        env:
          VITE_API_URL:  http://localhost:5000
          VITE_APP_NAME: MythicGames

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Build
        working-directory: frontend
        run: node ./node_modules/vite/bin/vite.js build
        env:
          VITE_API_URL:  http://localhost:5000
          VITE_APP_NAME: MythicGames

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Docker Build Validation ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          push:      false
          tags:      mythic-games-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context:   ./frontend
          push:      false
          tags:      mythic-games-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:5000
            VITE_APP_NAME=MythicGames
          cache-from: type=gha
          cache-to:   type=gha,mode=max
